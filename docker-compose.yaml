services:
  tesla-http-proxy:
    build:
      context: .
      dockerfile: Dockerfile.tesla-http-proxy
    container_name: tesla-http-proxy
    volumes:
      - ./certs:/app/certs:ro
    ports:
      - "4443:4443"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tesla-smart-charger:
    build:
      context: .
      dockerfile: Dockerfile.tesla-smart-charger
    container_name: tesla-smart-charger
    volumes:
      # Persistent config directory (new v2 format: system.json + vehicles.json)
      - ./config:/app/config
      # Persistent database
      - ./data:/app/data
      # TLS certs for the proxy
      - ./certs:/app/certs:ro
    ports:
      - "8000:8000"
    environment:
      - TESLA_CERTS_DIR=/app/certs
      - TZ=Europe/Lisbon
    restart: unless-stopped
    depends_on:
      - tesla-http-proxy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
